name: Documentation

on:
  push:
    branches: [development, documentation]
  pull_request:
    branches: [development, documentation]

jobs:
  deploy:
    # Reusable workflow defaults the source folder to `docs/` — the
    # Docusaurus site now lives there (migrated from `docusaurus/`).
    uses: ConductionNL/.github/.github/workflows/documentation.yml@main
    with:
      cname: zaakafhandelapp.conduction.nl
